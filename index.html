  document.getElementById('modal-miss-btn').classList.toggle('selected', result === 'miss');
  document.getElementById('modal-success-btn').classList.toggle('selected', result === 'success');
}

function saveRecord() {
  const cb = STATE.cueBall;
  const ob = STATE.objectBall;
  const pi = STATE.lastEnteredPocket;

  let distCB = null, distOBP = null, cutAngle = null, side = null;
  if (cb && ob) {
    distCB = toTableUnits(dist(cb, ob));
    if (pi !== null) {
      const pocket = { x: TABLE.pockets[pi][0], y: TABLE.pockets[pi][1] };
      distOBP  = toTableUnits(dist(ob, pocket));
      cutAngle = calculateCutAngle(cb, ob, pocket);
      side     = calculateSide(cb, ob, pocket);
    }
  }

  const record = {
    id: Date.now(),
    ts: new Date().toISOString(),
    result: STATE.modalResult,
    memo: document.getElementById('modal-memo').value.trim(),
    cueBall:    cb ? { rx: (cb.x - TABLE.x) / TABLE.w, ry: (cb.y - TABLE.y) / TABLE.h } : null,
    objectBall: ob ? { rx: (ob.x - TABLE.x) / TABLE.w, ry: (ob.y - TABLE.y) / TABLE.h } : null,
    pocket: pi,
    spin: { x: STATE.spin.x, y: STATE.spin.y },
    stats: { distCB, distOBP, cutAngle, side },
  };

  const records = loadRecords();
  records.unshift(record);
  localStorage.setItem('billiards_records', JSON.stringify(records));

  closeSaveModal();
  showToast('記録しました ✓');
}

/* ============================================================
   HISTORY
============================================================ */
function loadRecords() {
  try {
    return JSON.parse(localStorage.getItem('billiards_records') || '[]');
  } catch { return []; }
}

function renderHistory() {
  const records = loadRecords();
  const container = document.getElementById('history-content');

  if (records.length === 0) {
    container.innerHTML = `
      <div class="history-empty">
        <div class="icon">📋</div>
        <div>記録がまだありません。<br>台画面またはボーラードで保存してください。</div>
      </div>`;
    return;
  }

  let html = '<div class="history-list">';
  records.forEach(r => {
    const dt = new Date(r.ts);
    const dateStr = `${dt.getMonth()+1}/${dt.getDate()} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;

    if (r.type === 'bowlliard') {
      // ボーラードカード
      const perfect = r.totalScore === 300 ? ' 🏆' : r.totalScore >= 200 ? ' 🌟' : '';
      html += `
        <div class="history-card-bowl">
          <div>
            <div class="bowl-card-label">🎳 ボーラード</div>
            <div class="bowl-card-score">${r.totalScore}${perfect}</div>
          </div>
          <div style="text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
            <div class="bowl-card-date">${dateStr}</div>
            <button class="btn-sm btn-sm-del" onclick="deleteRecord(${r.id})">削除</button>
          </div>
        </div>`;
    } else {
      // 配置記録カード（既存）
      const s = r.stats || {};
      html += `
        <div class="history-card">
          <div style="grid-column:1">
            <div class="hc-header">
              <span class="result-badge ${r.result === 'miss' ? 'badge-miss' : 'badge-success'}">${r.result === 'miss' ? 'ミス' : '成功'}</span>
              ${r.pocket != null ? `<span style="font-size:0.75rem;color:var(--text-muted)">→ ${POCKET_NAMES[r.pocket]}</span>` : ''}
              <span class="hc-date">${dateStr}</span>
            </div>
            <div class="hc-stats">
              ${s.distCB != null ? `<div class="hc-stat">${s.distCB.toFixed(1)}% <span>CB距離</span></div>` : ''}
              ${s.distOBP != null ? `<div class="hc-stat">${s.distOBP.toFixed(1)}% <span>OB距離</span></div>` : ''}
              ${s.cutAngle != null ? `<div class="hc-stat">${s.cutAngle.toFixed(1)}° <span>カット角</span></div>` : ''}
              ${s.side ? `<div class="hc-stat">${s.side}</div>` : ''}
              ${r.spin ? `<div class="hc-stat">縦${r.spin.y >= 0 ? '+' : ''}${r.spin.y.toFixed(1)} 横${r.spin.x >= 0 ? '+' : ''}${r.spin.x.toFixed(1)} <span>撞点</span></div>` : ''}
            </div>
            ${r.memo ? `<div class="hc-memo">${escHtml(r.memo)}</div>` : ''}
          </div>
          <div class="hc-actions">
            <button class="btn-sm btn-sm-load" onclick="loadRecord(${r.id})">復元</button>
            <button class="btn-sm btn-sm-del" onclick="deleteRecord(${r.id})">削除</button>
          </div>
        </div>`;
    }
  });
  html += '</div>';
  container.innerHTML = html;
}

function loadRecord(id) {
  const records = loadRecords();
  const r = records.find(x => x.id === id);
  if (!r) return;

  STATE.cueBall = r.cueBall
    ? { x: TABLE.x + r.cueBall.rx * TABLE.w, y: TABLE.y + r.cueBall.ry * TABLE.h }
    : null;
  STATE.objectBall = r.objectBall
    ? { x: TABLE.x + r.objectBall.rx * TABLE.w, y: TABLE.y + r.objectBall.ry * TABLE.h }
    : null;

  draw();
  switchView('table');
  showToast('配置を復元しました');
}

function deleteRecord(id) {
  const records = loadRecords().filter(x => x.id !== id);
  localStorage.setItem('billiards_records', JSON.stringify(records));
  renderHistory();
}

function clearAllHistory() {
  if (!confirm('全ての記録を削除しますか？')) return;
  localStorage.removeItem('billiards_records');
  renderHistory();
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ============================================================
   AI TEXT COPY
============================================================ */
function copyAIText() {
  const cb = STATE.cueBall;
  const ob = STATE.objectBall;

  if (!cb || !ob) {
    showToast('手球と的球を配置してください');
    return;
  }

  const pi = STATE.lastEnteredPocket;
  const distCB = toTableUnits(dist(cb, ob)).toFixed(1);
  const lines = [
    'ビリヤードの練習中です。以下の配置について、的球をポケットに入れる際のアドバイスをお願いします。',
    '',
    '■ 配置情報',
    `・手球と的球の距離: 台の幅を100%としたとき ${distCB}%`,
  ];

  if (pi !== null) {
    const pocket = { x: TABLE.pockets[pi][0], y: TABLE.pockets[pi][1] };
    lines.push(`・狙うポケット: ${POCKET_NAMES[pi]}`);
    lines.push(`・的球とポケットの距離: ${toTableUnits(dist(ob, pocket)).toFixed(1)}%`);
    lines.push(`・カット角: ${calculateCutAngle(cb, ob, pocket).toFixed(1)}度`);
    lines.push(`・振り: ${calculateSide(cb, ob, pocket)}`);
  }

  const sy = STATE.spin.y, sx = STATE.spin.x;
  const spinVertLabel = sy > 0.05 ? `押し(+${sy.toFixed(1)})` : sy < -0.05 ? `引き(${sy.toFixed(1)})` : '中心';
  const spinHorizLabel = sx > 0.05 ? `右ひねり(+${sx.toFixed(1)})` : sx < -0.05 ? `左ひねり(${sx.toFixed(1)})` : '中心';
  lines.push(`・撞点: 縦=${spinVertLabel} / 横=${spinHorizLabel}`);

  lines.push('');
  lines.push('この配置で注意すべき点、推奨される撞点、力加減についてアドバイスをください。');

  const text = lines.join('\n');

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      showToast('クリップボードにコピーしました 📋');
    }).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  showToast('コピーしました 📋');
}

/* ============================================================
   BOWLLIARD
   フラット配列（rolls）でスコア管理する厳密なボウリング計算
============================================================ */

// rolls[0..20]: 各投の倒したピン数（0〜10）
// activeCell: { frame: 0-9, roll: 0-2 }
const BOWL = {
  rolls: Array(21).fill(null), // null = 未入力
  activeFrame: null,
  activeRoll: null,
};

/* ---- スコア計算 ---- */
function calcBowlScore() {
  const r = BOWL.rolls;
  const frameScores = []; // 各フレームまでの累計
  let ri = 0; // rollsのインデックス
  let total = 0;

  for (let f = 0; f < 10; f++) {
    if (r[ri] === null) { frameScores.push(null); ri++; continue; }

    if (f < 9) {
      if (r[ri] === 10) {
        // ストライク
        const b1 = r[ri+1] ?? null, b2 = r[ri+2] ?? null;
        if (b1 === null || b2 === null) { frameScores.push(null); ri++; continue; }
        total += 10 + b1 + b2;
        frameScores.push(total);
        ri += 1;
      } else {
        const p2 = r[ri+1] ?? null;
        if (p2 === null) { frameScores.push(null); ri += 2; continue; }
        if (r[ri] + p2 === 10) {
          // スペア
          const b1 = r[ri+2] ?? null;
          if (b1 === null) { frameScores.push(null); ri += 2; continue; }
          total += 10 + b1;
        } else {
          total += r[ri] + p2;
        }
        frameScores.push(total);
        ri += 2;
      }
    } else {
      // 10フレーム: 最大3投、ボーナスなしでそのまま加算
      const p1 = r[ri] ?? 0;
      const p2 = r[ri+1] ?? null;
      const p3 = r[ri+2] ?? null;
      let fScore = p1;
      if (p2 !== null) fScore += p2;
      if (p3 !== null) fScore += p3;
      // 少なくとも2投入力済みなら表示
      if (p2 !== null) {
        total += fScore;
        frameScores.push(total);
      } else {
        frameScores.push(null);
      }
    }
  }
  return frameScores;
}

/* ---- rolls上のインデックス計算 ---- */
// フレームf・投目r（0-indexed）→ rollsのインデックス
function rollIndex(frame, roll) {
  let ri = 0;
  for (let f = 0; f < frame; f++) {
    if (f < 9) {
      ri += (BOWL.rolls[ri] === 10) ? 1 : 2;
    } else {
      ri += 3;
    }
  }
  return ri + roll;
}

/* ---- 入力可能な最大値を返す ---- */
function maxPinsForRoll(frame, roll) {
  if (frame < 9) {
    if (roll === 0) return 10;
    const ri0 = rollIndex(frame, 0);
    return 10 - (BOWL.rolls[ri0] ?? 0);
  } else {
    // 10フレーム
    const ri0 = rollIndex(10, 0); // = rollIndex(9,0)
    const r0 = BOWL.rolls[ri0] ?? 0;
    const r1 = BOWL.rolls[ri0+1] ?? null;
    if (roll === 0) return 10;
    if (roll === 1) return r0 === 10 ? 10 : 10 - r0;
    if (roll === 2) {
      if (r0 === 10 && r1 === 10) return 10;
      if (r0 === 10) return 10 - (r1 ?? 0);
      if (r0 + (r1??0) === 10) return 10;
      return 0; // 3投目なし
    }
  }
  return 10;
}

/* ---- 3投目が入力可能か ---- */
function canRoll3(frame) {
  if (frame !== 9) return false;
  const ri = rollIndex(9, 0);
  const r0 = BOWL.rolls[ri], r1 = BOWL.rolls[ri+1];
  if (r0 === null || r1 === null) return false;
  return r0 === 10 || r0 + r1 === 10;
}

/* ---- スコアシートのHTMLを生成・描画 ---- */
function renderScoreSheet() {
  const container = document.getElementById('score-frames');
  const frameScores = calcBowlScore();
  let html = '';

  for (let f = 0; f < 10; f++) {
    const is10 = f === 9;
    const ri0 = rollIndex(f, 0);
    const r0 = BOWL.rolls[ri0];
    const r1 = BOWL.rolls[ri0+1];
    const r2 = is10 ? BOWL.rolls[ri0+2] : null;

    const fScore = frameScores[f];
    const scoreText = fScore !== null ? String(fScore) : '';

    // 各セルの表示テキストとクラスを決定
    function cellDisplay(rVal, rIdx, rollNum) {
      if (rVal === null) return { text: '', cls: '' };
      if (!is10) {
        if (rollNum === 0 && rVal === 10) return { text: 'X', cls: 'strike' };
        if (rollNum === 1 && (BOWL.rolls[ri0] + rVal) === 10) return { text: '/', cls: 'spare' };
        return { text: rVal === 0 ? '-' : String(rVal), cls: '' };
      } else {
        // 10フレーム
        if (rollNum === 0 && rVal === 10) return { text: 'X', cls: 'strike' };
        if (rollNum === 1) {
          if (r0 === 10 && rVal === 10) return { text: 'X', cls: 'strike' };
          if (r0 !== 10 && (r0 + rVal) === 10) return { text: '/', cls: 'spare' };
        }
        if (rollNum === 2) {
          if (rVal === 10) return { text: 'X', cls: 'strike' };
          if (r0 === 10 && r1 !== 10 && (r1 + rVal) === 10) return { text: '/', cls: 'spare' };
        }
        return { text: rVal === 0 ? '-' : String(rVal), cls: '' };
      }
    }

    const d0 = cellDisplay(r0, ri0, 0);
    const d1 = cellDisplay(r1, ri0+1, 1);
    const d2 = is10 ? cellDisplay(r2, ri0+2, 2) : null;

    function cellClass(rVal, rollNum, d) {
      let cls = `roll-cell ${d.cls}`;
      if (BOWL.activeFrame === f && BOWL.activeRoll === rollNum) cls += ' active-input';
      // disabled判定
      const isDisabled =
        (rollNum === 1 && !is10 && r0 === 10) ||
        (rollNum === 2 && is10 && !canRoll3(f));
      if (isDisabled) cls += ' disabled';
      return cls;
    }

    html += `<div class="score-frame ${is10 ? 'frame-10' : ''}">
      <div class="frame-label">${f+1}F</div>
      <div class="frame-rolls">
        <div class="${cellClass(r0, 0, d0)}" onclick="selectRollCell(${f},0)">${d0.text}</div>`;

    if (!is10 && r0 !== 10) {
      html += `<div class="${cellClass(r1, 1, d1)}" onclick="selectRollCell(${f},1)">${d1.text}</div>`;
    } else if (!is10) {
      html += `<div class="roll-cell disabled"></div>`;
    } else {
      // 10フレーム
      html += `<div class="${cellClass(r1, 1, d1)}" onclick="selectRollCell(${f},1)">${d1.text}</div>`;
      const d2cls = canRoll3(f)
        ? cellClass(r2, 2, d2)
        : 'roll-cell disabled';
      html += `<div class="${d2cls}" onclick="selectRollCell(${f},2)">${d2 ? d2.text : ''}</div>`;
    }

    html += `</div>
      <div class="frame-score">${scoreText}</div>
    </div>`;
  }

  container.innerHTML = html;
  document.getElementById('bowl-total').textContent = String(frameScores.filter(s => s !== null).slice(-1)[0] ?? 0);
}

/* ---- セル選択 ---- */
function selectRollCell(frame, roll) {
  // 未入力の前の投があれば最初の未入力を選ぶ
  BOWL.activeFrame = frame;
  BOWL.activeRoll = roll;
  openNumpad(frame, roll);
  renderScoreSheet();
}

/* ---- テンキーを開く ---- */
function openNumpad(frame, roll) {
  const maxPins = maxPinsForRoll(frame, roll);
  const overlay = document.getElementById('numpad-overlay');
  const hint = document.getElementById('numpad-hint');
  const grid = document.getElementById('numpad-grid');

  hint.textContent = `${frame+1}フレーム ${roll+1}投目（最大 ${maxPins}）`;

  // ボタン生成: 0〜maxPins + 削除 + 閉じる
  let btns = '';
  for (let i = 0; i <= maxPins; i++) {
    btns += `<button class="numpad-btn" onclick="inputPin(${i})">${i === 0 ? '-' : i}</button>`;
  }
  // 空きを埋める（6列グリッドのため最大11個 → 残りをspan）
  btns += `<button class="numpad-btn numpad-del" onclick="deletePin()">⌫</button>`;
  btns += `<button class="numpad-btn numpad-close" onclick="closeNumpad()">完了</button>`;
  grid.innerHTML = btns;

  overlay.classList.add('open');
}

function closeNumpad() {
  document.getElementById('numpad-overlay').classList.remove('open');
  BOWL.activeFrame = null;
  BOWL.activeRoll = null;
  renderScoreSheet();
}

/* ---- ピン数入力 ---- */
function inputPin(pins) {
  if (BOWL.activeFrame === null) return;
  const ri = rollIndex(BOWL.activeFrame, BOWL.activeRoll);
  BOWL.rolls[ri] = pins;

  // 次のセルへ自動移動
  advanceActiveCell();
  renderScoreSheet();
  // テンキーのヒントを更新
  if (BOWL.activeFrame !== null) {
    openNumpad(BOWL.activeFrame, BOWL.activeRoll);
  } else {
    closeNumpad();
  }
}

function deletePin() {
  if (BOWL.activeFrame === null) return;
  const ri = rollIndex(BOWL.activeFrame, BOWL.activeRoll);
  BOWL.rolls[ri] = null;
  // 後続を全消し
  for (let i = ri; i < 21; i++) BOWL.rolls[i] = null;
  renderScoreSheet();
  openNumpad(BOWL.activeFrame, BOWL.activeRoll);
}

/* ---- 次の入力セルへ移動 ---- */
function advanceActiveCell() {
  let f = BOWL.activeFrame, r = BOWL.activeRoll;
  if (f === null) return;

  if (f < 9) {
    const ri0 = rollIndex(f, 0);
    if (r === 0 && BOWL.rolls[ri0] !== 10) {
      // 2投目へ
      BOWL.activeRoll = 1;
    } else {
      // 次フレームへ
      BOWL.activeFrame = f + 1;
      BOWL.activeRoll = 0;
    }
  } else {
    // 10フレーム
    if (r === 0) {
      BOWL.activeRoll = 1;
    } else if (r === 1) {
      if (canRoll3(f)) BOWL.activeRoll = 2;
      else { BOWL.activeFrame = null; BOWL.activeRoll = null; }
    } else {
      BOWL.activeFrame = null; BOWL.activeRoll = null;
    }
  }
}

/* ---- リセット ---- */
function resetBowlliard() {
  BOWL.rolls = Array(21).fill(null);
  BOWL.activeFrame = null;
  BOWL.activeRoll = null;
  closeNumpad();
  renderScoreSheet();
}

/* ---- 保存 ---- */
function saveBowlliard() {
  const frameScores = calcBowlScore();
  const totalScore = frameScores.filter(s => s !== null).slice(-1)[0] ?? 0;
  const hasData = BOWL.rolls.some(r => r !== null);
  if (!hasData) { showToast('スコアを入力してください'); return; }

  const record = {
    id: Date.now(),
    ts: new Date().toISOString(),
    type: 'bowlliard',
    totalScore,
    frameScores,
    rolls: [...BOWL.rolls],
  };

  const records = loadRecords();
  records.unshift(record);
  localStorage.setItem('billiards_records', JSON.stringify(records));
  showToast('ボーラードスコアを保存しました ✓');
}

/* ============================================================
   VIEW SWITCHING
============================================================ */
function switchView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.getElementById('tab-' + view).classList.add('active');

  if (view === 'history') renderHistory();
  if (view === 'bowlliard') renderScoreSheet();
  if (view === 'table') {
    requestAnimationFrame(() => { resizeCanvas(); });
  }
}

/* ============================================================
   TOAST
============================================================ */
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ============================================================
   SPIN SELECTOR
============================================================ */
const spinCanvas = document.getElementById('spin-canvas');
const spinCtx = spinCanvas.getContext('2d');
const SPIN_SIZE = 72; // canvas size in px
spinCanvas.width = SPIN_SIZE;
spinCanvas.height = SPIN_SIZE;

function drawSpinSelector() {
  const c = spinCtx;
  const W = SPIN_SIZE, H = SPIN_SIZE;
  const cx = W / 2, cy = H / 2;
  const R = W / 2 - 3; // outer radius
  c.clearRect(0, 0, W, H);

  // 背景: 手球グラデーション
  const grad = c.createRadialGradient(cx - R*0.3, cy - R*0.3, R*0.1, cx, cy, R);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(0.5, '#e8e8e0');
  grad.addColorStop(1, '#b0b0a0');
  c.beginPath();
  c.arc(cx, cy, R, 0, Math.PI * 2);
  c.fillStyle = grad;
  c.fill();
  c.strokeStyle = 'rgba(255,255,255,0.3)';
  c.lineWidth = 1.5;
  c.stroke();

  // ガイド線（縦横）
  c.strokeStyle = 'rgba(100,180,120,0.4)';
  c.lineWidth = 1;
  c.setLineDash([2, 2]);
  c.beginPath();
  c.moveTo(cx, cy - R); c.lineTo(cx, cy + R);
  c.moveTo(cx - R, cy); c.lineTo(cx + R, cy);
  c.stroke();
  c.setLineDash([]);

  // 有効範囲円
  c.beginPath();
  c.arc(cx, cy, R * 0.78, 0, Math.PI * 2);
  c.strokeStyle = 'rgba(100,180,120,0.25)';
  c.lineWidth = 1;
  c.stroke();

  // 撞点マーカー
  const MAX_OFFSET = R * 0.78;
  const mx = cx + STATE.spin.x * MAX_OFFSET;
  const my = cy - STATE.spin.y * MAX_OFFSET; // y軸反転

  // 外リング
  c.beginPath();
  c.arc(mx, my, 7, 0, Math.PI * 2);
  c.fillStyle = 'rgba(100,220,255,0.25)';
  c.fill();
  c.strokeStyle = 'rgba(100,220,255,0.95)';
  c.lineWidth = 2;
  c.stroke();
  // 中心点
  c.beginPath();
  c.arc(mx, my, 2.5, 0, Math.PI * 2);
  c.fillStyle = 'rgba(100,220,255,1.0)';
  c.fill();

  // テキスト更新
  const sx = STATE.spin.x, sy = STATE.spin.y;
  let label = '中心';
  if (Math.abs(sx) > 0.1 || Math.abs(sy) > 0.1) {
    const v = sy > 0.1 ? '押し' : sy < -0.1 ? '引き' : '';
    const h = sx > 0.1 ? '右' : sx < -0.1 ? '左' : '';
    label = (v && h) ? `${v}・${h}` : (v || h || '中心');
  }
  document.getElementById('spin-value-text').textContent = label;
}

function getSpinFromPos(e) {
  const rect = spinCanvas.getBoundingClientRect();
  const scaleX = SPIN_SIZE / rect.width;
  const scaleY = SPIN_SIZE / rect.height;
  let px, py;
  if (e.touches) {
    px = (e.touches[0].clientX - rect.left) * scaleX;
    py = (e.touches[0].clientY - rect.top) * scaleY;
  } else {
    px = (e.clientX - rect.left) * scaleX;
    py = (e.clientY - rect.top) * scaleY;
  }
  const cx = SPIN_SIZE / 2, cy = SPIN_SIZE / 2;
  const R = SPIN_SIZE / 2 - 3;
  const MAX_OFFSET = R * 0.78;
  // クランプ（円形範囲内）
  let dx = px - cx, dy = py - cy;
  const d = Math.sqrt(dx*dx + dy*dy);
  if (d > MAX_OFFSET) { dx = dx/d * MAX_OFFSET; dy = dy/d * MAX_OFFSET; }
  return {
    x: Math.round(dx / MAX_OFFSET * 10) / 10,
    y: Math.round(-dy / MAX_OFFSET * 10) / 10,
  };
}

let _spinDragging = false;
spinCanvas.addEventListener('mousedown', e => {
  _spinDragging = true;
  STATE.spin = getSpinFromPos(e);
  drawSpinSelector();
  draw();
});
spinCanvas.addEventListener('mousemove', e => {
  if (!_spinDragging) return;
  STATE.spin = getSpinFromPos(e);
  drawSpinSelector();
  draw();
});
spinCanvas.addEventListener('mouseup', () => { _spinDragging = false; });
spinCanvas.addEventListener('mouseleave', () => { _spinDragging = false; });

spinCanvas.addEventListener('touchstart', e => {
  e.preventDefault();
  _spinDragging = true;
  STATE.spin = getSpinFromPos(e);
  drawSpinSelector();
  draw();
}, { passive: false });
spinCanvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!_spinDragging) return;
  STATE.spin = getSpinFromPos(e);
  drawSpinSelector();
  draw();
}, { passive: false });
spinCanvas.addEventListener('touchend', () => { _spinDragging = false; });

// ダブルタップでリセット
spinCanvas.addEventListener('dblclick', () => {
  STATE.spin = { x: 0, y: 0 };
  drawSpinSelector();
  draw();
});

/* ============================================================
   INIT & RESIZE
============================================================ */
window.addEventListener('resize', () => resizeCanvas());
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));

buildPocketButtons();
resizeCanvas();
drawSpinSelector();
</script>
